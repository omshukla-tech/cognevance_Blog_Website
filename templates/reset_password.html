{% extends "base.html" %}

{% block title %}Reset Password - VlogVerse{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <!-- Card Glow -->
            <div class="auth-glow"></div>

            <!-- Header -->
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h2>Reset Password</h2>
                <p>Choose a strong password to secure your account</p>
            </div>

            <!-- Divider -->
            <div class="auth-divider">
                <span></span>
                {% if error %}<div class="error-message">⚠ {{error}}</div>{% endif %}
                <span></span>
            </div>

            <!-- Reset Password Form -->
            <form class="auth-form" method="POST" action="/reset_password">
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" name="Password" id="resetPassword" class="form-input" required autocomplete="new-password" minlength="6">
                        <label for="resetPassword" class="form-label">New Password</label>
                        <div class="input-highlight"></div>
                        <i class="fas fa-lock input-icon" aria-hidden="true"></i>
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" name="ConfirmPassword" id="confirmPassword" class="form-input" required autocomplete="new-password" minlength="6">
                        <label for="confirmPassword" class="form-label">Confirm New Password</label>
                        <div class="input-highlight"></div>
                        <i class="fas fa-lock input-icon" aria-hidden="true"></i>
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="auth-submit">
                    <span>Update Password</span>
                    <i class="fas fa-check-circle"></i>
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <p>Need more help? <a href="/help">Contact Support</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
