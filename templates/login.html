{% extends "base.html" %}

{% block title %}Log In - VlogVerse{% endblock %}

{% block content %}
<div class="auth-section">
    <div class="auth-container">
        <div class="auth-card">
            <!-- Card Glow -->
            <div class="auth-glow"></div>
            
            <!-- Header -->
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-play-circle"></i>
                </div>
                <h2>Welcome Back</h2>
                <p>Log in to continue your creative journey</p>
            </div>

            <!-- Divider -->
            <div class="auth-divider">
                <span></span>
                {% if error %}<div class="error-message">⚠ {{error}}</div>{% endif %}
                <span></span>
            </div>

            <!-- Login Form -->
            <form class="auth-form" id="loginForm" method="POST" action="/login">
                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="email" name="Email" id="loginEmail" class="form-input" required autocomplete="email" spellcheck="false">
                        <label for="loginEmail" class="form-label">Email Address</label>
                        <div class="input-highlight"></div>
                        <i class="fas fa-envelope input-icon" aria-hidden="true"></i>
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-wrapper">
                        <input type="password" name="Password" id="loginPassword" class="form-input" required autocomplete="current-password" minlength="6">
                        <label for="loginPassword" class="form-label">Password</label>
                        <div class="input-highlight"></div>
                        <i class="fas fa-lock input-icon" aria-hidden="true"></i>
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" checked>
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-label">Remember me</span>
                    </label>
                    <a href= "{{url_for('forget_password')}}" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-submit">
                    <span>Log In</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <!-- Footer -->
            <div class="auth-footer">
                <p>Don't have an account? <a href="/signup">Sign Up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
